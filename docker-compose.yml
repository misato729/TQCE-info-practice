services:
  frontend:
    build:
      context: ./frontend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      NUXT_PUBLIC_API_BASE: http://localhost:3001
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    command: bash -lc "bundle install && bin/rails db:prepare && bin/rails server -b 0.0.0.0 -p 3000"
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/tqce_development
      RAILS_ENV: development
    ports:
      - "3001:3000"
    volumes:
      - ./backend:/app
      - backend_bundle:/usr/local/bundle
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tqce_development
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tqce_development"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  frontend_node_modules:
  backend_bundle:
  postgres_data:
