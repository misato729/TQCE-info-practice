# fly.toml app configuration file generated for tqce-info-practice on 2026-07-01T23:17:54Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'tqce-info-practice'
primary_region = 'nrt'

[build]
  dockerfile = 'Dockerfile'

[deploy]
  release_command = './bin/rails db:prepare'

[env]
  RACK_ENV = 'production'
  RAILS_ENV = 'production'
  RAILS_SERVE_STATIC_FILES = 'true'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/api/v1/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
