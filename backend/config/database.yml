default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS", 5) %>
  url: <%= ENV["DATABASE_URL"] %>

development:
  <<: *default
  database: tqce_development

test:
  <<: *default
  database: tqce_test

production:
  <<: *default
  database: tqce_production
